<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KOOJI Hotpot — POS</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="manifest" href="manifest.json">
<script>
// ============================================
// DATA & STATE
// ============================================
let tables = {};
for (let i = 1; i <= 6; i++) {
    tables[i] = { status: 'available', persons: [], extras: [], total: 0, customer: '', discount: 0, orderTime: null };
}

let noodles = JSON.parse(localStorage.getItem('hotpotNoodles') || '[{"id":"n1","name":"Khmer Noodle","price":0},{"id":"n2","name":"Chinese Big Noodle","price":0}]');
let drinks = JSON.parse(localStorage.getItem('hotpotDrinks') || '[{"id":"d1","name":"Coke","price":2500},{"id":"d2","name":"Chinese Tea","price":2000},{"id":"d3","name":"Water","price":1000}]');

const BASE_PRICE = 8000;
const EXTRA_NOODLE_PRICE = 2000;
let currentTable = null;
let orders = JSON.parse(localStorage.getItem('hotpotOrders') || '[]');
let kitchenQueue = JSON.parse(localStorage.getItem('hotpotKitchen') || '[]');
let dailyStats = JSON.parse(localStorage.getItem('hotpotStats') || '{"revenue":0,"orders":0}');
let customers = JSON.parse(localStorage.getItem('hotpotCustomers') || '{}');
let staffMembers = JSON.parse(localStorage.getItem('hotpotStaff') || '{"1234":{"name":"Admin","role":"admin"},"0000":{"name":"Cashier","role":"cashier"}}');
let currentUser = JSON.parse(localStorage.getItem('hotpotCurrentUser') || 'null');
let dailyExpenses = [];

// ============================================
// TABLE GRID
// ============================================
function renderTableGrid() {
    const grid = document.getElementById('table-grid');
    if(!grid) return;
    grid.innerHTML = '';
    for (let i = 1; i <= 6; i++) {
        const t = tables[i];
        let bg = 'bg-gray-100 border-gray-200', icon = '⚪', txt = 'Free';
        if (t.status === 'occupied') { bg = 'bg-green-100 border-green-400'; icon = '🟢'; txt = t.persons.length+'p'; }
        else if (t.status === 'cleaning') { bg = 'bg-red-100 border-red-400'; icon = '🔴'; txt = 'Clean'; }
        let chairs = '';
        for (let c = 1; c <= 4; c++) chairs += `<div class="w-3 h-3 rounded-full border border-gray-300 ${c <= t.persons.length ? 'bg-red-300' : 'bg-white'}"></div>`;
        grid.innerHTML += `<button onclick="selectTable(${i})" class="table-btn ${bg} rounded-xl border-2 p-3 flex flex-col items-center gap-1 hover:shadow-md"><span class="text-2xl">${icon}</span><span class="font-bold text-sm">Table ${i}</span><span class="text-xs">${txt}</span><div class="flex gap-1">${chairs}</div></button>`;
    }
}

function selectTable(num) {
    if (tables[num].status === 'cleaning') { if(confirm('Mark clean?')) { tables[num].status = 'available'; renderTableGrid(); } return; }
    currentTable = num;
    if (tables[num].status === 'available') { tables[num].status = 'occupied'; tables[num].orderTime = new Date(); }
    document.getElementById('panel-table-title').innerText = '🍲 Table ' + num;
    document.getElementById('btn-add-person').disabled = false;
    renderOrderPanel(); renderTableGrid();
}

function addPerson() {
    if(!currentTable) return;
    tables[currentTable].persons.push({ noodle: noodles[0]?.name || 'Khmer Noodle', note: '', extraNoodle: false });
    renderOrderPanel();
}

function removePerson(i) { if(!currentTable) return; tables[currentTable].persons.splice(i,1); renderOrderPanel(); }
function updatePersonNoodle(i, v) { if(!currentTable) return; tables[currentTable].persons[i].noodle = v; renderOrderPanel(); }
function updatePersonNote(i, v) { if(!currentTable) return; tables[currentTable].persons[i].note = v; }
function toggleExtraNoodle(i) { if(!currentTable) return; tables[currentTable].persons[i].extraNoodle = !tables[currentTable].persons[i].extraNoodle; renderOrderPanel(); }
function addExtra(did) { if(!currentTable) return; const d = drinks.find(x => x.id === did); if(d) tables[currentTable].extras.push({...d, qty:1}); renderOrderPanel(); }
function removeExtra(i) { if(!currentTable) return; tables[currentTable].extras.splice(i,1); renderOrderPanel(); }

function clearTable() {
    if(!currentTable) return;
    if(confirm('Clear this table?')) {
        tables[currentTable] = { status: 'available', persons: [], extras: [], total: 0, customer: '', discount: 0, orderTime: null };
        currentTable = null;
        document.getElementById('panel-table-title').innerText = 'Select a Table';
        document.getElementById('btn-add-person').disabled = true;
        renderOrderPanel(); renderTableGrid();
    }
}

// ============================================
// ORDER PANEL
// ============================================
function renderOrderPanel() {
    if(!currentTable) { document.getElementById('panel-persons').innerHTML = '<p class="text-gray-400 text-center mt-8">Select a table to start</p>'; updateTotals(); return; }
    const t = tables[currentTable];
    document.getElementById('panel-persons-count').innerText = t.persons.length+' person(s)';
    let h = '';
    t.persons.forEach((p,i) => {
        h += `<div class="bg-white border rounded-lg p-2 mb-2">
            <div class="flex justify-between items-center mb-1"><span class="font-bold text-sm">Person ${i+1}</span><button onclick="removePerson(${i})" class="text-red-400 text-xs">✕</button></div>
            <select onchange="updatePersonNoodle(${i}, this.value)" class="w-full text-xs border rounded px-2 py-1 mb-1">${noodles.map(n => `<option value="${n.name}" ${p.noodle===n.name?'selected':''}>🍜 ${n.name}</option>`).join('')}</select>
            <input type="text" placeholder="Note (spicy, less broth...)" value="${p.note}" onchange="updatePersonNote(${i}, this.value)" class="w-full text-xs border rounded px-2 py-1 mb-1">
            <label class="flex items-center gap-1 text-xs cursor-pointer"><input type="checkbox" ${p.extraNoodle?'checked':''} onchange="toggleExtraNoodle(${i})"> Extra Noodle (+2,000R)</label>
        </div>`;
    });
    h += `<div class="border-t pt-2 mt-2"><p class="text-xs font-medium mb-1">Drinks & Extras:</p>`;
    t.extras.forEach((e,i) => {
        h += `<div class="flex justify-between items-center text-xs bg-gray-50 rounded px-2 py-1 mb-1"><span>${e.name} x${e.qty||1}</span><div class="flex items-center gap-2"><span class="font-medium">${(e.price*(e.qty||1)).toLocaleString()}R</span><button onclick="removeExtra(${i})" class="text-red-400">✕</button></div></div>`;
    });
    h += `</div>`;
    document.getElementById('panel-persons').innerHTML = h;
    renderDrinkButtons(); updateTotals();
}

function renderDrinkButtons() {
    document.getElementById('drinks-container').innerHTML = drinks.map(d => 
        `<button onclick="addExtra('${d.id}')" class="text-xs bg-blue-50 text-blue-700 px-2 py-1 rounded-full border border-blue-200 hover:bg-blue-100">${d.name} +${d.price.toLocaleString()}R</button>`
    ).join('');
}

function updateTotals() {
    if(!currentTable) { document.getElementById('panel-total').innerText = '0R'; return; }
    const t = tables[currentTable];
    let pTotal = t.persons.length * BASE_PRICE;
    t.persons.forEach(p => { if(p.extraNoodle) pTotal += EXTRA_NOODLE_PRICE; });
    let eTotal = t.extras.reduce((s,e) => s + (e.price*(e.qty||1)), 0);
    let sub = pTotal + eTotal;
    const dp = parseInt(document.getElementById('discount-select')?.value || 0);
    const da = Math.round(sub * dp / 100);
    const total = sub - da;
    tables[currentTable].total = total;
    document.getElementById('panel-persons-total').innerText = pTotal.toLocaleString()+'R';
    document.getElementById('panel-extras-total').innerText = eTotal.toLocaleString()+'R';
    document.getElementById('panel-discount').innerText = da>0 ? '-'+da.toLocaleString()+'R' : '0R';
    document.getElementById('panel-total').innerText = total.toLocaleString()+'R';
}

// ============================================
// PAYMENT
// ============================================
function processPayment() {
    if(!currentTable) return;
    const t = tables[currentTable];
    if(t.persons.length === 0) { alert('Add at least one person'); return; }
    const ci = document.getElementById('customer-input');
    const cn = ci?.value.trim() || 'Regular Customer';
    t.customer = cn;
    const pm = confirm('Cash? OK=Cash, Cancel=Bank') ? 'cash' : 'bank';
    const order = { tableNum: currentTable, persons: [...t.persons], extras: [...t.extras], total: t.total, customer: cn, paymentMethod: pm, time: new Date() };
    orders.push(order); kitchenQueue.push({...order, status:'pending'});
    dailyStats.revenue += t.total; dailyStats.orders++;
    if(cn !== 'Regular Customer') { if(!customers[cn]) customers[cn]={name:cn,totalVisits:0,totalSpent:0}; customers[cn].totalVisits++; customers[cn].totalSpent+=t.total; customers[cn].lastVisit=new Date().toISOString(); }
    saveAllData();
    printReceipt(order);
    tables[currentTable] = { status: 'cleaning', persons: [], extras: [], total: 0, customer: '', discount: 0, orderTime: null };
    currentTable = null;
    document.getElementById('panel-table-title').innerText = 'Select a Table';
    document.getElementById('btn-add-person').disabled = true;
    document.getElementById('customer-input').value = '';
    document.getElementById('discount-select').value = '0';
    updateStats(); renderOrderPanel(); renderTableGrid(); renderKitchen();
    alert('Order complete!\nTable: ' + order.tableNum + '\nTotal: ' + order.total.toLocaleString() + 'R');
}

function updateStats() {
    document.getElementById('stat-revenue').innerText = dailyStats.revenue.toLocaleString()+'R';
    document.getElementById('stat-orders').innerText = dailyStats.orders;
    const a = dailyStats.orders>0 ? Math.round(dailyStats.revenue/dailyStats.orders) : 0;
    document.getElementById('stat-avg').innerText = a.toLocaleString()+'R';
}

function saveAllData() {
    localStorage.setItem('hotpotOrders', JSON.stringify(orders));
    localStorage.setItem('hotpotKitchen', JSON.stringify(kitchenQueue));
    localStorage.setItem('hotpotStats', JSON.stringify(dailyStats));
    localStorage.setItem('hotpotCustomers', JSON.stringify(customers));
    localStorage.setItem('hotpotStaff', JSON.stringify(staffMembers));
    if(currentUser) localStorage.setItem('hotpotCurrentUser', JSON.stringify(currentUser));
}

// ============================================
// BLUETOOTH PRINTING
// ============================================
const PRINTER_SERVICES = [
    '000018f0-0000-1000-8000-00805f9b34fb',
    '00001101-0000-1000-8000-00805f9b34fb',
    '0000ffe0-0000-1000-8000-00805f9b34fb',
];

let btDevice = null;
let btCharacteristic = null;
let savedPrinterId = localStorage.getItem('hotpotPrinterId') || null;
// Check if Bluetooth is available
async function checkBluetoothReady() {
    // Android needs location permission for Bluetooth scanning
    if (!navigator.bluetooth) {
        alert('❌ Bluetooth not supported on this device/browser.\n\nUse Chrome on Android or Desktop.');
        return false;
    }
    
    const available = await navigator.bluetooth.getAvailability();
    if (!available) {
        alert('❌ Bluetooth is disabled.\n\nPlease turn on Bluetooth and Location/GPS.');
        return false;
    }
    
    return true;
}

async function connectBluetooth() {
    // Check Bluetooth first
    if (!await checkBluetoothReady()) return;
    
    try {
        const statusEl = document.getElementById('bluetooth-status');
        statusEl.innerHTML = 'Scanning...';
        statusEl.className = 'text-xs bg-yellow-500 px-2 py-1 rounded-full';
        
        const device = await navigator.bluetooth.requestDevice({ 
            acceptAllDevices: true,
            optionalServices: PRINTER_SERVICES
        });
        
        const server = await device.gatt.connect();
        btDevice = device;
        
        savedPrinterId = device.id;
        localStorage.setItem('hotpotPrinterId', device.id);
        localStorage.setItem('hotpotPrinterName', device.name);
        
        let found = false;
        for (const uuid of PRINTER_SERVICES) {
            try {
                const service = await server.getPrimaryService(uuid);
                const characteristics = await service.getCharacteristics();
                for (const char of characteristics) {
                    if (char.properties.write || char.properties.writeWithoutResponse) {
                        btCharacteristic = char;
                        found = true;
                        break;
                    }
                }
                if (found) break;
            } catch(e) {}
        }
        
        if (!found) {
            const services = await server.getPrimaryServices();
            for (const svc of services) {
                try {
                    const chars = await svc.getCharacteristics();
                    for (const char of chars) {
                        if (char.properties.write || char.properties.writeWithoutResponse) {
                            btCharacteristic = char;
                            found = true;
                            break;
                        }
                    }
                    if (found) break;
                } catch(e) {}
            }
        }
        
        if (!found) throw new Error('No writable characteristic found');
        
        statusEl.innerHTML = device.name;
        statusEl.className = 'text-xs bg-green-500 text-white px-2 py-1 rounded-full';
        
        const rs = document.getElementById('receipt-printer-select');
        const ks = document.getElementById('kitchen-printer-select');
        if (rs) rs.innerHTML = `<option>${device.name}</option>`;
        if (ks) ks.innerHTML = `<option>${device.name}</option>`;
        
        device.addEventListener('gattserverdisconnected', () => {
            statusEl.innerHTML = 'Printer Off';
            statusEl.className = 'text-xs bg-red-500 px-2 py-1 rounded-full';
            btDevice = null;
            btCharacteristic = null;
        });
        
        alert('✅ Bluetooth printer connected!\n' + device.name);
        
    } catch(e) {
        console.error(e);
        document.getElementById('bluetooth-status').innerHTML = 'Printer Off';
        document.getElementById('bluetooth-status').className = 'text-xs bg-red-500 px-2 py-1 rounded-full';
        
        if (e.name === 'NotFoundError') {
            alert('❌ No device selected.\n\nOn Android:\n1. Turn ON Bluetooth\n2. Turn ON Location/GPS\n3. Pair printer in Settings first');
        } else if (e.name === 'SecurityError') {
            alert('❌ Permission denied.\n\nOn Android, allow Location permission for Chrome.');
        } else {
            alert('❌ Connection failed: ' + (e.message || 'Unknown'));
        }
    }
}
// Auto-reconnect on page load
async function autoReconnectPrinter() {
    if (!savedPrinterId) return;
    
    try {
        const statusEl = document.getElementById('bluetooth-status');
        statusEl.innerHTML = 'Auto-connecting...';
        statusEl.className = 'text-xs bg-yellow-500 px-2 py-1 rounded-full';
        
        const devices = await navigator.bluetooth.getDevices();
        const savedDevice = devices.find(d => d.id === savedPrinterId);
        
        if (savedDevice) {
            const server = await savedDevice.gatt.connect();
            btDevice = savedDevice;
            
            let found = false;
            for (const uuid of PRINTER_SERVICES) {
                try {
                    const service = await server.getPrimaryService(uuid);
                    const chars = await service.getCharacteristics();
                    for (const char of chars) {
                        if (char.properties.write || char.properties.writeWithoutResponse) {
                            btCharacteristic = char;
                            found = true;
                            break;
                        }
                    }
                    if (found) break;
                } catch(e) {}
            }
            
            if (!found) {
                const services = await server.getPrimaryServices();
                for (const svc of services) {
                    const chars = await svc.getCharacteristics();
                    for (const char of chars) {
                        if (char.properties.write || char.properties.writeWithoutResponse) {
                            btCharacteristic = char;
                            found = true;
                            break;
                        }
                    }
                    if (found) break;
                }
            }
            
            if (found) {
                const name = localStorage.getItem('hotpotPrinterName') || 'Printer';
                statusEl.innerHTML = name;
                statusEl.className = 'text-xs bg-green-500 text-white px-2 py-1 rounded-full';
                console.log('Auto-reconnected to printer:', name);
                
                const rs = document.getElementById('receipt-printer-select');
                const ks = document.getElementById('kitchen-printer-select');
                if (rs) rs.innerHTML = `<option>${name}</option>`;
                if (ks) ks.innerHTML = `<option>${name}</option>`;
                
                savedDevice.addEventListener('gattserverdisconnected', () => {
                    statusEl.innerHTML = 'Printer Off';
                    statusEl.className = 'text-xs bg-red-500 px-2 py-1 rounded-full';
                    btDevice = null;
                    btCharacteristic = null;
                });
            }
        }
    } catch(e) {
        console.log('Auto-reconnect failed — click Connect BT');
        document.getElementById('bluetooth-status').innerHTML = 'Printer Off';
        document.getElementById('bluetooth-status').className = 'text-xs bg-red-500 px-2 py-1 rounded-full';
    }
}

async function sendToPrinter(text) {
    const encoder = new TextEncoder();
    const data = encoder.encode(text);
    const CHUNK_SIZE = 512;
    
    for (let i = 0; i < data.length; i += CHUNK_SIZE) {
        const chunk = data.slice(i, Math.min(i + CHUNK_SIZE, data.length));
        try {
            if (btCharacteristic.properties.writeWithoutResponse) {
                await btCharacteristic.writeValueWithoutResponse(chunk);
            } else {
                await btCharacteristic.writeValue(chunk);
            }
        } catch(e) {
            for (let j = 0; j < chunk.length; j += 64) {
                const mini = chunk.slice(j, Math.min(j + 64, chunk.length));
                if (btCharacteristic.properties.writeWithoutResponse) {
                    await btCharacteristic.writeValueWithoutResponse(mini);
                } else {
                    await btCharacteristic.writeValue(mini);
                }
            }
        }
        if (i + CHUNK_SIZE < data.length) {
            await new Promise(r => setTimeout(r, 15));
        }
    }
}

function sanitizeText(str) {
    return str
        .replace(/[R]/, 'R')
        .replace(/[\u{1F300}-\u{1FAFF}]/gu, '')
        .replace(/[^\x00-\x7F\x0A\x0D]/g, '');
}

function padRight(str, len) {
    str = String(str);
    return str + ' '.repeat(Math.max(0, len - str.length));
}

function padLeft(str, len) {
    str = String(str);
    return ' '.repeat(Math.max(0, len - str.length)) + str;
}

function buildKitchenTicket(order) {
    const WIDTH = 32;
    const line = '='.repeat(WIDTH);
    const dash = '-'.repeat(WIDTH);
    
    let txt = '\x1B\x40';
    txt += '\x1B\x61\x01';
    txt += '\x1B\x21\x10';
    
    txt += '\n' + line + '\n';
    txt += '   KITCHEN ORDER\n';
    txt += line + '\n';
    
    txt += '\x1B\x21\x00';
    txt += '\x1B\x61\x00';
    
    txt += '\n';
    txt += padRight('  TABLE: ' + order.tableNum, WIDTH/2);
    txt += padLeft('TIME: ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), WIDTH/2) + '\n';
    txt += '  PERSONS: ' + order.persons.length + '\n';
    txt += line + '\n\n';
    
    order.persons.forEach((p, i) => {
        txt += '\x1B\x45\x01';
        txt += '  PERSON ' + (i+1) + '\n';
        txt += '\x1B\x45\x00';
        txt += '    Noodle : ' + p.noodle + '\n';
        if (p.extraNoodle) txt += '    Extra  : + Extra Noodle\n';
        if (p.note) txt += '    Note   : ' + sanitizeText(p.note) + '\n';
        txt += '\n';
    });
    
    if (order.extras && order.extras.length > 0) {
        txt += dash + '\n';
        txt += '  EXTRAS\n';
        txt += dash + '\n';
        order.extras.forEach(e => {
            txt += '    * ' + e.name + ' x' + (e.qty||1) + '\n';
        });
        txt += '\n';
    }
    
    txt += '\x1B\x61\x01';
    txt += '\x1B\x45\x01';
    txt += line + '\n';
    txt += '  PLEASE PREPARE ASAP\n';
    txt += line + '\n';
    txt += '\x1B\x45\x00';
    
    txt += '\n\n\n\n';
    txt += '\x1D\x56\x41';
    
    return sanitizeText(txt);
}

function buildReceiptTicket(order) {
    const WIDTH = 32;
    const line = '='.repeat(WIDTH);
    const dash = '-'.repeat(WIDTH);
    const BASE_PRICE = 8000;
    const EXTRA_NOODLE_PRICE = 2000;
    
    const today = new Date().toDateString();
    let orderNum = parseInt(localStorage.getItem('hotpotOrderNum') || '0');
    if (localStorage.getItem('hotpotOrderDate') !== today) {
        orderNum = 1;
        localStorage.setItem('hotpotOrderDate', today);
    } else {
        orderNum++;
    }
    localStorage.setItem('hotpotOrderNum', orderNum);
    const orderId = String(orderNum).padStart(3, '0');
    
    let txt = '\x1B\x40';
    txt += '\x1B\x61\x01';
    
    txt += '\x1B\x21\x10';
    txt += '\n' + line + '\n';
    txt += '   KOOJI: The Hotpot\n';
    txt += line + '\n';
    txt += '\x1B\x21\x00';
    
    txt += '  015 64 51 98\n';
    txt += '  Chrey, Battambang, KH\n';
    txt += line + '\n\n';
    
    txt += '\x1B\x61\x00';
    txt += '- Table No  : ' + order.tableNum + '\n';
    txt += '- Date : ' + new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'}) + '\n';
    txt += '- Order : ' + orderId + '\n';
    txt += '- Time      : ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + '\n';
    txt += '- Payment : ' + (order.paymentMethod === 'cash' ? 'Cash' : 'Bank') + '\n';
    txt += '- Persons   : ' + order.persons.length + '\n';
    if (order.customer) txt += '- Customer  : ' + order.customer + '\n';
    txt += line + '\n\n';
    
    txt += '\x1B\x61\x01';
    txt += '\x1B\x45\x01';
    txt += '  ORDER DETAILS\n';
    txt += '\x1B\x45\x00';
    txt += dash + '\n\n';
    
    txt += '\x1B\x61\x00';
    order.persons.forEach((p, i) => {
        txt += '\x1B\x45\x01';
        txt += '  Person ' + (i+1) + '\n';
        txt += '\x1B\x45\x00';
        txt += '    Noodle  : ' + p.noodle + '\n';
        txt += '    Base    : ' + padLeft(BASE_PRICE.toLocaleString() + 'R', 12) + '\n';
        if (p.extraNoodle) {
            txt += '    Extra   : ' + padLeft(EXTRA_NOODLE_PRICE.toLocaleString() + 'R', 12) + '\n';
        }
        if (p.note) txt += '    Note    : ' + sanitizeText(p.note) + '\n';
        txt += dash + '\n';
    });
    
    if (order.extras && order.extras.length > 0) {
        txt += '\x1B\x61\x01';
        txt += '  Extras\n';
        txt += '\x1B\x61\x00';
        txt += dash + '\n';
        order.extras.forEach(e => {
            const extTotal = e.price * (e.qty || 1);
            txt += '    ' + e.name + ' x ' + (e.qty||1);
            txt += padLeft(extTotal.toLocaleString() + 'R', WIDTH - 6 - e.name.length - 4) + '\n';
        });
        txt += dash + '\n';
    }
    
    let personTotal = order.persons.length * BASE_PRICE;
    order.persons.forEach(p => { if (p.extraNoodle) personTotal += EXTRA_NOODLE_PRICE; });
    let extrasTotal = order.extras.reduce((s, e) => s + (e.price * (e.qty || 1)), 0);
    
    txt += '\n';
    txt += '\x1B\x61\x00';
    txt += '  SUBTOTAL' + padLeft(personTotal.toLocaleString() + 'R', WIDTH - 10) + '\n';
    txt += '  EXTRAS' + padLeft(extrasTotal.toLocaleString() + 'R', WIDTH - 8) + '\n';
    txt += '\n';
    
    txt += '\x1B\x45\x01';
    txt += '\x1B\x21\x10';
    txt += '  TOTAL' + padLeft(order.total.toLocaleString() + 'R', WIDTH - 7) + '\n';
    txt += '\x1B\x21\x00';
    txt += '\x1B\x45\x00';
    
    txt += '\x1B\x61\x01';
    txt += line + '\n';
    txt += '     THANK YOU!\n';
    txt += '  Please visit again :)\n';
    txt += line + '\n';
    txt += '  WiFi: koojiwifi#!\n';
    
    txt += '\n\n\n\n';
    txt += '\x1D\x56\x41';
    
    return sanitizeText(txt);
}

async function printReceipt(order) {
    if (!btDevice || !btCharacteristic) { 
        alert('Connect Bluetooth printer first!');
        return; 
    }
    
    try {
        if (!btDevice.gatt.connected) {
            document.getElementById('bluetooth-status').innerHTML = 'Reconnecting...';
            document.getElementById('bluetooth-status').className = 'text-xs bg-yellow-500 px-2 py-1 rounded-full';
            await btDevice.gatt.connect();
        }
        
        const kitchenTicket = buildKitchenTicket(order);
        await sendToPrinter(kitchenTicket);
        await new Promise(r => setTimeout(r, 150));
        
        const receiptTicket = buildReceiptTicket(order);
        await sendToPrinter(receiptTicket);
        
        document.getElementById('bluetooth-status').innerHTML = btDevice.name;
        document.getElementById('bluetooth-status').className = 'text-xs bg-green-500 text-white px-2 py-1 rounded-full';
        
        alert('Kitchen ticket + Receipt printed!');
        
    } catch(e) {
        console.error('Print error:', e);
        btDevice = null;
        btCharacteristic = null;
        document.getElementById('bluetooth-status').innerHTML = 'Printer Off';
        document.getElementById('bluetooth-status').className = 'text-xs bg-red-500 px-2 py-1 rounded-full';
        alert('Print failed. Reconnect printer and try again.');
    }
}

function printKitchenTicket() {
    if (!currentTable) { alert('Select a table first'); return; }
    const t = tables[currentTable];
    const order = { 
        tableNum: currentTable, persons: t.persons, extras: t.extras, 
        total: t.total, customer: t.customer || 'Regular', paymentMethod: 'cash', discount: 0 
    };
    
    if (!btDevice || !btCharacteristic) { alert('Connect Bluetooth printer first!'); return; }
    
    (async () => {
        try {
            if (!btDevice.gatt.connected) await btDevice.gatt.connect();
            const kitchenTicket = buildKitchenTicket(order);
            await sendToPrinter(kitchenTicket);
            alert('Kitchen ticket printed!');
        } catch(e) { alert('Print failed'); }
    })();
}

// KITCHEN DISPLAY
// ============================================
function renderKitchen() {
    const pEl = document.getElementById('kitchen-pending'), prEl = document.getElementById('kitchen-preparing'), rEl = document.getElementById('kitchen-ready');
    if(!pEl||!prEl||!rEl) return;
    pEl.innerHTML=''; prEl.innerHTML=''; rEl.innerHTML='';
    let c = {pending:0,preparing:0,ready:0};
    kitchenQueue.forEach(o => {
        const ticket = document.createElement('div');
        ticket.className = 'bg-white p-2 rounded border shadow-sm text-xs';
        ticket.innerHTML = `<div class="flex justify-between mb-1"><b>T${o.tableNum}</b><span class="text-gray-400">${new Date(o.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div>
        <div class="text-right mb-1"><b>${o.customer||'Regular'}</b></div>
        ${o.persons.map((p,i) => `<div class="border-t pt-1 mb-1"><b>P${i+1}:</b> ${p.noodle}${p.extraNoodle?' +Extra':''}${p.note?`<div class="text-gray-500">${p.note}</div>`:''}</div>`).join('')}
        ${o.extras.length>0?`<div class="border-t pt-1"><b>Extras:</b> ${o.extras.map(e=>e.name+' x'+(e.qty||1)).join(', ')}</div>`:''}
        <div class="flex gap-1 mt-2">${getKitchenActions(o)}</div>`;
        if(o.status==='pending'){pEl.appendChild(ticket);c.pending++;}
        else if(o.status==='preparing'){prEl.appendChild(ticket);c.preparing++;}
        else{rEl.appendChild(ticket);c.ready++;}
    });
    document.getElementById('count-pending').innerText=c.pending;
    document.getElementById('count-preparing').innerText=c.preparing;
    document.getElementById('count-ready').innerText=c.ready;
    document.getElementById('btn-start-all').style.display=c.pending>0?'inline-block':'none';
    document.getElementById('btn-ready-all').style.display=c.preparing>0?'inline-block':'none';
    document.getElementById('btn-finish-all').style.display=c.ready>0?'inline-block':'none';
}

function getKitchenActions(o) {
    if(o.status==='pending') return `<button onclick="updateKitchen('${o.tableNum}','preparing')" class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs">Start</button>`;
    else if(o.status==='preparing') return `<button onclick="updateKitchen('${o.tableNum}','ready')" class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-xs">Ready</button>`;
    return `<button onclick="updateKitchen('${o.tableNum}','completed')" class="bg-gray-100 text-gray-500 px-2 py-0.5 rounded text-xs">Done</button>`;
}
function updateKitchen(tn,st) {
    const o = kitchenQueue.find(x=>x.tableNum===tn);
    if(o){if(st==='completed') kitchenQueue=kitchenQueue.filter(x=>x.tableNum!==tn); else o.status=st; saveAllData(); renderKitchen();}
}
function startAllPrep(){kitchenQueue.filter(o=>o.status==='pending').forEach(o=>o.status='preparing');saveAllData();renderKitchen();}
function readyAll(){kitchenQueue.filter(o=>o.status==='preparing').forEach(o=>o.status='ready');saveAllData();renderKitchen();}
function completeAll(){kitchenQueue=kitchenQueue.filter(o=>o.status!=='ready');saveAllData();renderKitchen();}

function showCustomerDropdown() { document.getElementById('customer-dropdown').classList.remove('hidden'); filterCustomerDropdown(); }
function filterCustomerDropdown() {
    const inp = document.getElementById('customer-input'), list = document.getElementById('customer-dropdown');
    if(!inp||!list) return;
    const s = inp.value.toLowerCase().trim();
    list.classList.remove('hidden');
    let names = Object.keys(customers).sort((a,b)=>(customers[b]?.totalVisits||0)-(customers[a]?.totalVisits||0));
    if(s) names = names.filter(n=>n.toLowerCase().includes(s));
    list.innerHTML = `<div onclick="selectCustomer('Regular Customer')" class="px-2 py-1.5 hover:bg-green-50 cursor-pointer border-b">Regular Customer</div>
    <div onclick="selectCustomer('__new__')" class="px-2 py-1.5 hover:bg-amber-50 cursor-pointer border-b">New Customer</div>`;
    if(names.length===0 && s) list.innerHTML += `<div class="px-2 py-1 text-gray-400">No match - type to add</div>`;
    else names.forEach(n => { const c=customers[n]; list.innerHTML += `<div onclick="selectCustomer('${n}')" class="px-2 py-1.5 hover:bg-orange-50 cursor-pointer flex justify-between"><span>${c.totalVisits>=20?'':''} ${n}</span><span class="text-gray-400">${c.totalVisits||0}v</span></div>`; });
}
function selectCustomer(n) {
    const inp = document.getElementById('customer-input'), dd = document.getElementById('customer-dropdown');
    if(n==='__new__'){inp.value='';inp.placeholder='Type new name...';dd.classList.add('hidden');inp.focus();return;}
    inp.value=n;dd.classList.add('hidden');
}
document.addEventListener('click',function(e){const dd=document.getElementById('customer-dropdown'),inp=document.getElementById('customer-input');if(dd&&inp&&!inp.contains(e.target)&&!dd.contains(e.target))dd.classList.add('hidden');});
